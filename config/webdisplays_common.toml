#If true, breaking the minePad is required to craft upgrades.
hard_recipes = true
#Whether or not webdisplays should thank the user for using the mod
join_message = true
#If true, the ownership thief item will be disabled
disable_ownership_thief = false

#Options for the miniserver
[mini_server]
	#The port used by miniserv. 0 to disable
	# Default: 25566
	# Range: 0 ~ 32767
	miniserv_port = 25566
	#The amount of data that can be uploaded to miniserv, in KiB (so 1024 = 1 MiO)
	# Default: 1920
	# Range: 0 ~ 9223372036854775807
	miniserv_quota = 1920

#Options for the in world screen blocks
[screen_options]
	#The maximum value screen's horizontal resolution, in pixels
	# Default: 1920
	# Range: > 0
	max_resolution_x = 1920
	#The maximum value screen's vertical resolution, in pixels
	# Default: 1080
	# Range: > 0
	max_resolution_y = 1080
	#The maximum width for the screen multiblock, in blocks
	# Default: 16
	# Range: > 0
	max_width = 16
	#The maximum height for the screen multiblock, in blocks
	# Default: 16
	# Range: > 0
	max_height = 16

#Options for video playback synchronization across players
[video_sync]
	#Enable video playback synchronization across all players viewing the same screen
	enabled = true
	#List of domains where video sync is enabled. Use * to enable for all sites. Examples: youtube.com, hianime.to
	sync_whitelist = "youtube.com,youtu.be,hianime.to,9animetv.to,9anime.to,aniwave.to"
	#Time difference (in seconds) before forcing a seek to sync. Lower = stricter sync but more seeking
	# Default: 3
	# Range: 1 ~ 30
	sync_tolerance_seconds = 3
	#How often (in milliseconds) the master player broadcasts their playback time
	# Default: 2000
	# Range: 500 ~ 10000
	sync_interval_ms = 2000

#Options for the browsers (both the minePad and the screens)
[browser_options]
	#The page which screens should open up to when turning on
	blacklist = ""
	#The page which screens should open up to when turning on
	home_page = "mod://webdisplays/main.html"
